spring:
  application:
    name: spring-boot-ai-template

  # Active profile — override via -Dspring-boot.run.profiles=<profile> or SPRING_PROFILES_ACTIVE env var
  profiles:
    active: local

  # Jackson — ISO-8601 timestamps, omit null fields
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # JPA baseline — profile-specific files override ddl-auto and show-sql
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true   # Kubernetes liveness (/actuator/health/liveness) & readiness probes
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# ── /actuator/info metadata ───────────────────────────────────────────────────
info:
  app:
    name: ${spring.application.name}
    version: "@project.version@"
    java-version: "@java.version@"

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.example.template: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ── Custom application properties ────────────────────────────────────────────
app:
  openapi:
    server-url: "http://localhost:${server.port:8080}"
